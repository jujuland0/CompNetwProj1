	<h2>Here is an XSS Protection Demo : </h2>
	<p>Input text below to be sanitized by DOMPurify</p>
	<input type="text" id="userInput" placeholder="Enter text here">
	<button onclick="sanitizeInput()">Submit</button>

	<p>Sanitized Output : <span id="sanitizedOutput"></span></p>
	<script src="https://cdn.jsdelivr.net/npm/dompurify@2.2.0/dist/purify.min.js"></script>
	<script>
		function sanitizeInput() {
			const userInput = document.getElementById('userInput').value;
			const sanitizedOutput = DOMPurify.sanitize(userInput);
			document.getElementById('sanitizedOutput').textContent = sanitizedOutput;
		}
	</script>

</body>
